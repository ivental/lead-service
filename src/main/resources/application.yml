spring:
  application:
    name: contact-service

  datasource:
    url: jdbc:postgresql://localhost:5432/contact_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    enabled: false  # пока нет миграций

server:
  port: 8080

logging:
  level:
    ru.mentee.power.crm: DEBUG