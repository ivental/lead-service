spring:
  application:
    name: lead-service

  datasource:
    url: jdbc:postgresql://localhost:5433/lead_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    ru.mentee.power.crm: DEBUG
app:
  contact-service:
    url: ${CONTACT_SERVICE_URL:http://localhost:8083}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000